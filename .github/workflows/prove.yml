name: prove
on: 
  workflow_dispatch: 
    inputs: 
      secret_hex: 
        description: "32-byte secret hex"
        required: true
      target_hex: 
        description: "32-byte target hex (contract id)"
        required: true
      selector_hex:
        description: "4-byte selector hex"
        required: true
jobs:
  groth16:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: swap 8G
        run: sudo fallocate -l 8G /swap2 && sudo chmod 600 /swap2 && sudo mkswap /swap2 && sudo swapon /swap2 && free -h
      - name: install risc0 toolchain (rzup)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          export PATH="$HOME/.risc0/bin:$PATH"
          rzup install rust
          rzup install cargo-risczero 3.0.5
          rzup install r0vm 3.0.5
          rzup show
      - name: DIAGNOSA (tempel output step ini)
        env:
          RISC0_USE_DOCKER: "1"
        run: |
          export PATH="$HOME/.risc0/bin:$PATH"
          echo "=== rzup show ==="
          rzup show || echo "rzup TIDAK ada di PATH"
          echo "=== toolchain dir ==="
          ls -la ~/.rustup/toolchains/ 2>/dev/null || echo "no rustup toolchains"
          ls -la ~/.risc0/ 2>/dev/null
          ls -la ~/.risc0/toolchains/rust/bin/ 2>/dev/null || echo "no risc0 rust bin"
          echo "=== docker ==="
          docker info | head -3 || echo "docker MATI"
          echo "=== env ==="
          echo "RISC0_USE_DOCKER=$RISC0_USE_DOCKER"
      - name: prove
        env: 
          RISC0_USE_DOCKER: "1"
          SECRET_HEX: "${{ inputs.secret_hex }}"
          TARGET_HEX: "${{ inputs.target_hex }}"
          SELECTOR_HEX: "${{ inputs.selector_hex }}"
        run: |
          export PATH="$HOME/.risc0/bin:$PATH"
          cd contracts/creator-badge
          cargo run -p host --bin fixture --release
      - uses: actions/upload-artifact@v4
        with: 
          name: fixture
          path: contracts/creator-badge/out/
